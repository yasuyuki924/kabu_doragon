<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ローカル株分析ボード | ランキングチャート一覧</title>
    <link rel="stylesheet" href="./assets/style.css" />
    <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
  </head>
  <body data-page="index-scanner">
    <main class="container">
      <header class="page-header">
        <div>
          <p class="eyebrow">ローカル株分析ボード</p>
          <h1>ランキングチャート一覧</h1>
          <p class="subtle">ランキング銘柄を小型チャート付きで連続確認</p>
        </div>
        <div class="header-actions">
          <a id="indexPickedLink" class="action-button secondary scanner-picked-link" href="./picked.html">選別一覧</a>
          <button id="indexResetPicksButton" class="text-button scanner-reset-picks" type="button">選別リセット</button>
        </div>
      </header>

      <section class="panel scanner-toolbar index-scanner-toolbar">
        <div class="scanner-toolbar-row scanner-date-row">
          <div class="scanner-toolbar-title">日付</div>
          <div class="date-picker-wrap scanner-date-tools">
            <div id="indexMiniCalendar" class="date-calendar-wrap"></div>
            <div id="indexDateMeta" class="meta"></div>
          </div>
        </div>
        <label>
          <span>並び順</span>
          <select id="indexSort">
            <option value="gainers">値上がり率順</option>
            <option value="losers">値下がり率順</option>
            <option value="volume">出来高順</option>
            <option value="code">コード順</option>
            <option value="new_high">新高値順</option>
            <option value="deviation25">25日線乖離順</option>
            <option value="deviation75">75日線乖離順</option>
            <option value="deviation200">200日線乖離順</option>
            <option value="watch_candidates">監視候補順</option>
          </select>
        </label>
        <label>
          <span>業種</span>
          <select id="indexTag">
            <option value="">すべて</option>
          </select>
        </label>
        <label>
          <span>条件</span>
          <select id="indexCondition">
            <option value="">なし</option>
            <option value="rise">上昇銘柄のみ</option>
            <option value="fall">下落銘柄のみ</option>
            <option value="new_high">新高値のみ</option>
            <option value="above_ma25">MA25上のみ</option>
            <option value="above_ma75">MA75上のみ</option>
            <option value="above_ma200">MA200上のみ</option>
            <option value="volume_2x">出来高倍率2倍以上</option>
            <option value="watch_candidate">監視候補のみ</option>
          </select>
        </label>
        <label>
          <span>表示件数</span>
          <select id="indexLimit">
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="200">200</option>
          </select>
        </label>
        <label>
          <span>期間</span>
          <select id="indexMonths">
            <option value="1">1ヶ月</option>
            <option value="3" selected>3ヶ月</option>
            <option value="6">6ヶ月</option>
            <option value="12">12ヶ月</option>
          </select>
        </label>
      </section>

      <section class="panel">
        <div id="indexMeta" class="meta"></div>
        <div id="indexError" class="status-box error" hidden></div>
        <div id="indexList" class="scanner-list index-scanner-list"></div>
      </section>
    </main>

    <script src="./assets/app.js"></script>
  </body>
</html>
